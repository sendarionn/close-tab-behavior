<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Close Tab Behavior の設定</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="logo" aria-hidden="true">↩</div>
        <div>
          <p class="eyebrow">CLOSE TAB BEHAVIOR</p>
          <h1>タブを閉じた、その次へ。</h1>
          <p class="lead">アクティブなタブを閉じたときの移動先を選択できます。</p>
        </div>
      </header>

      <form id="settings">
        <fieldset>
          <legend>移動先</legend>
          <label class="choice">
            <input type="radio" name="behavior" value="recent">
            <span class="choice-copy">
              <strong>直近でアクティブだったタブ</strong>
              <small>ひとつ前に見ていたタブへ戻ります</small>
            </span>
            <span class="key">おすすめ</span>
          </label>
          <label class="choice">
            <input type="radio" name="behavior" value="rightmost">
            <span class="choice-copy">
              <strong>最も右のタブ</strong>
              <small>ウィンドウの右端にあるタブへ移動します</small>
            </span>
          </label>
          <label class="choice">
            <input type="radio" name="behavior" value="leftmost">
            <span class="choice-copy">
              <strong>最も左のタブ</strong>
              <small>ウィンドウの左端にあるタブへ移動します</small>
            </span>
          </label>
        </fieldset>

        <fieldset>
          <legend>詳細</legend>
          <label class="toggle-row">
            <span class="choice-copy">
              <strong>固定タブを移動先から除外</strong>
              <small>通常のタブだけを対象にします</small>
            </span>
            <span class="toggle">
              <input type="checkbox" id="ignorePinned">
              <span aria-hidden="true"></span>
            </span>
          </label>
        </fieldset>

        <div class="footer">
          <p id="status" role="status" aria-live="polite"></p>
          <button type="submit">設定を保存</button>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
